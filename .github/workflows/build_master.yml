# This git branch (sync_with_sourceforge) exists solely for running Git Action
# if re-run of workflow is not visible, updating and commiting this workflow file should help to get re-run back
name: Build latest master with CMake, run Ctest on Linux, Windows, MacOS

on:
  #schedule:
  # Scheduled workflows only run if the workflow file exists on the default branch.
  #  - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:
  push:
    branches:
      - sync_with_sourceforge

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release, Debug]

    steps:
    - name: Checkout repo's master branch, no history
      uses: actions/checkout@v4
      with:
        ref: master
        fetch-depth: 0
        fetch-tags: true

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Test
      working-directory: build
      run: ctest --output-on-failure -C ${{ matrix.build_type }}
