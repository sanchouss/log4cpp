# a DailyRollingFileAppender test config

log4cpp.rootCategory=DEBUG, rootAppender
log4cpp.category.sub1=,DAILY, NCDAILY

log4cpp.appender.rootAppender=org.apache.log4cpp.ConsoleAppender
log4cpp.appender.rootAppender.layout=org.apache.log4cpp.BasicLayout

log4cpp.appender.DAILY=DailyRollingFileAppender
log4cpp.appender.DAILY.fileName=dailyrolling_props_config.log
log4cpp.appender.DAILY.maxDaysKeep=1
log4cpp.appender.DAILY.layout=PatternLayout
log4cpp.appender.DAILY.layout.ConversionPattern=%d [%p] Daily Rolling Appender in working dir, time %d{%H:%M}, msg: %m%n

log4cpp.appender.NCDAILY=DailyRollingFileAppender
log4cpp.appender.NCDAILY.fileName=nesteddir/dailyrolling_props_config.log
log4cpp.appender.NCDAILY.maxDaysKeep=1
log4cpp.appender.NCDAILY.layout=PatternLayout
log4cpp.appender.NCDAILY.layout.ConversionPattern=%d [%p] Daily Rolling Appender in nested dir, time %d{%H:%M}, msg: %m%n
